version: 1

categories:
  - id: browsers
    name: Browsers
    description: Web browsers and daily internet tools.
  - id: desktop
    name: Desktop
    description: Display tuning, theme, browser defaults and time settings.
  - id: development
    name: Development
    description: Editors, runtimes, source control and container tooling.
  - id: communication
    name: Communication
    description: Messaging, voice and streaming desktop apps.
  - id: network
    name: Networking
    description: VPN, terminal and remote access utilities.
  - id: media
    name: Gaming & Media
    description: Media playback, capture, gaming and codecs.
  - id: utilities
    name: Utilities
    description: Search, archives, cloud sync and workstation helpers.
  - id: maintenance
    name: Maintenance
    description: Updates, drivers and Windows inbox recovery.
  - id: tweaks
    name: Tweaks
    description: Optional privacy, UX, gaming and security packs.
  - id: windows-features
    name: Windows Features
    description: Optional Windows capabilities and runtimes.

presets:
  generic:
    description: Neutral workstation-oriented defaults.
    selected:
      - firefox
      - vscode
      - git
      - github-cli
      - windows-update
  light:
    description: Personal preset with a broader default workstation stack.
    extends: generic
    selected:
      - chrome
      - powershell
      - python
      - nodejs
      - wireguard
      - windows-terminal
      - spotify
      - discord
      - termius
      - vlc
      - ffmpeg
      - sevenzip
      - mesh-agent
    values:
      mesh_url: "https://mesh.lgtw.tf/meshagents?id=4&meshid=W4tZHM@Pv3686vWHJYUmulXYFna1tmZx6BZB3WATaGwMb05@ZjRaRnba@vn$uqhF&installflags=0"

items:
  - id: auto-refresh-rate
    name: Display Refresh Optimization
    category: desktop
    description: Automatically tries to switch each detected display to the highest available refresh rate.
    platforms: [windows, linux]
    auto_apply: true
    install:
      windows:
        methods:
          - type: builtin
            action: auto_refresh_rate
      linux:
        methods:
          - type: builtin
            action: auto_refresh_rate

  - id: firefox
    name: Firefox
    category: browsers
    description: Mozilla Firefox.
    platforms: [windows, linux]
    detect:
      windows:
        any:
          - "winget list --disable-interactivity --id Mozilla.Firefox -e"
      linux:
        any:
          - "command -v firefox"
    install:
      windows:
        methods:
          - type: winget
            package: Mozilla.Firefox
            requires: [windows]
      linux:
        methods:
          - type: apt
            packages: [firefox]
            requires: [linux, apt]
          - type: dnf
            packages: [firefox]
            requires: [linux, dnf]
          - type: pacman
            packages: [firefox]
            requires: [linux, pacman]

  - id: chrome
    name: Google Chrome
    category: browsers
    description: Google Chrome browser.
    platforms: [windows, linux]
    detect:
      windows:
        any:
          - "winget list --disable-interactivity --id Google.Chrome -e"
      linux:
        any:
          - "command -v google-chrome"
    install:
      windows:
        methods:
          - type: winget
            package: Google.Chrome
            requires: [windows]
      linux:
        methods:
          - type: apt
            packages: [google-chrome-stable]
            requires: [linux, apt]
            repo:
              - "install -d -m 0755 /etc/apt/keyrings"
              - "curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /etc/apt/keyrings/google-chrome.gpg"
              - "chmod a+r /etc/apt/keyrings/google-chrome.gpg"
              - "echo 'deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main' > /etc/apt/sources.list.d/google-chrome.list"
          - type: dnf
            packages: [google-chrome-stable]
            requires: [linux, dnf]
            repo:
              - "cat > /etc/yum.repos.d/google-chrome.repo <<'EOF'\n[google-chrome]\nname=google-chrome\nbaseurl=https://dl.google.com/linux/chrome/rpm/stable/x86_64\nenabled=1\ngpgcheck=1\ngpgkey=https://dl.google.com/linux/linux_signing_key.pub\nEOF"

  - id: vscode
    name: Visual Studio Code
    category: development
    description: Official VS Code editor.
    platforms: [windows, linux]
    detect:
      windows:
        any:
          - "winget list --disable-interactivity --id Microsoft.VisualStudioCode -e"
      linux:
        any:
          - "command -v code"
    install:
      windows:
        methods:
          - type: winget
            package: Microsoft.VisualStudioCode
      linux:
        methods:
          - type: apt
            packages: [code]
            requires: [linux, apt]
            repo:
              - "apt-get install -y wget gpg"
              - "install -d -m 0755 /etc/apt/keyrings"
              - "wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /etc/apt/keyrings/packages.microsoft.gpg"
              - "chmod go+r /etc/apt/keyrings/packages.microsoft.gpg"
              - "echo 'deb [arch=amd64 signed-by=/etc/apt/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main' > /etc/apt/sources.list.d/vscode.list"
          - type: dnf
            packages: [code]
            requires: [linux, dnf]
            repo:
              - "rpm --import https://packages.microsoft.com/keys/microsoft.asc"
              - "cat > /etc/yum.repos.d/vscode.repo <<'EOF'\n[code]\nname=Visual Studio Code\nbaseurl=https://packages.microsoft.com/yumrepos/vscode\nenabled=1\ngpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc\nEOF"
          - type: shell
            requires: [linux, pacman]
            commands:
              - "echo 'VS Code official Linux setup is implemented for apt/dnf only in this build.'"

